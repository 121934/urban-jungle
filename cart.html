        .cart-details { flex: 1; margin-left: 20px; }
        .cart-total { text-align: right; font-size: 1.2rem; font-weight: bold; margin-top: 20px; }
        .btn-remove { color: #ff4d4d; cursor: pointer; border: none; background: none; font-weight: 600; }
